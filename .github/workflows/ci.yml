name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python SDK tests ────────────────────────────────────────────────────────
  test-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK
        run: |
          cd sdk
          pip install -e ".[dev]"
          pip install cryptography httpx scikit-learn numpy pydantic rich click \
                      pytest pytest-asyncio pytest-cov anyio

      - name: Run SDK tests
        run: |
          pytest tests/sdk/ -v --tb=short \
            --ignore=tests/sdk/test_crypto.py \
            --ignore=tests/sdk/test_ml.py \
            --ignore=tests/sdk/test_sandbox.py \
            --ignore=tests/sdk/test_deception.py \
            --ignore=tests/sdk/test_forensics.py \
            --ignore=tests/sdk/test_integrations.py

  # ── Threat Intel tests ──────────────────────────────────────────────────────
  test-threat-intel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run threat intel tests
        run: pytest tests/threat-intel/ -v --tb=short

  # ── Server smoke test ───────────────────────────────────────────────────────
  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install server dependencies
        run: |
          pip install fastapi uvicorn sqlalchemy aiosqlite pydantic pydantic-settings \
                      httpx websockets python-multipart pytest pytest-asyncio anyio

      - name: Server import smoke test
        run: |
          cd server
          python -m py_compile config.py
          python -m py_compile main.py || true
          python -c "import ast, glob, sys
          errors = []
          for f in glob.glob('**/*.py', recursive=True):
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('SYNTAX ERRORS:')
              for e in errors: print(e)
              sys.exit(1)
          print(f'All Python files syntax-valid')
          "

  # ── Dashboard build ─────────────────────────────────────────────────────────
  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd dashboard && npm install

      - name: Type check
        run: cd dashboard && npx tsc --noEmit

      - name: Build
        run: cd dashboard && npm run build

      - name: Audit (zero vulnerabilities)
        run: cd dashboard && npm audit --audit-level=moderate

  # ── JS/TS SDK build ─────────────────────────────────────────────────────────
  test-sdk-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build JS SDK
        run: |
          cd sdk-js
          npm install
          npm run build

  # ── Rust SDK build ──────────────────────────────────────────────────────────
  test-sdk-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test Rust SDK
        run: |
          cd sdk-rust
          cargo build 2>&1
          cargo test --lib 2>&1

  # ── Docker build ────────────────────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-sdk, test-server, test-dashboard]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: agentfortress-server:latest
